<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Caca Pump — Live</title>
<style>
  :root {
    --bg: #0a0e1a; --card: #111827; --border: #1f2937;
    --green: #10b981; --red: #ef4444; --yellow: #f59e0b;
    --blue: #3b82f6; --purple: #8b5cf6; --text: #e5e7eb; --muted: #6b7280;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size: 14px; }

  header { background: var(--card); border-bottom: 1px solid var(--border); padding: 10px 16px; position: sticky; top: 0; z-index: 100; }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  header h1 { font-size: 16px; font-weight: 700; color: var(--green); display: flex; align-items: center; gap: 6px; }
  #status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  .tabs { display: flex; gap: 4px; }
  .tab { flex: 1; padding: 6px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 12px; font-weight: 600; cursor: pointer; text-align: center; }
  .tab.active { background: var(--green); color: #000; border-color: var(--green); }

  .container { padding: 12px 16px; max-width: 600px; margin: 0 auto; }
  .page { display: none; }
  .page.active { display: block; }

  .grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px; }
  .card-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
  .card-value { font-size: 22px; font-weight: 700; }
  .card-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .pnl-pos { color: var(--green); }
  .pnl-neg { color: var(--red); }

  h2 { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin: 14px 0 6px; }

  /* Live feed */
  #live-log { display: flex; flex-direction: column; gap: 6px; }
  .live-item { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; }
  .live-item.signal { border-color: var(--green); background: rgba(16,185,129,.07); }
  .live-item.entry  { border-color: var(--yellow); background: rgba(245,158,11,.07); }
  .live-item.win    { border-color: var(--green); background: rgba(16,185,129,.12); }
  .live-item.loss   { border-color: var(--red); background: rgba(239,68,68,.08); }
  .live-item.scan   { border-color: var(--border); }
  .live-header { display: flex; justify-content: space-between; align-items: center; }
  .live-symbol { font-weight: 700; font-size: 14px; }
  .live-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px; }
  .badge-scan   { background: rgba(107,114,128,.2); color: var(--muted); }
  .badge-signal { background: rgba(16,185,129,.2); color: var(--green); }
  .badge-entry  { background: rgba(245,158,11,.2); color: var(--yellow); }
  .badge-win    { background: rgba(16,185,129,.25); color: var(--green); }
  .badge-loss   { background: rgba(239,68,68,.2); color: var(--red); }
  .live-detail  { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .live-time    { font-size: 10px; color: var(--muted); }

  /* Positions */
  .position { background: var(--card); border: 1px solid var(--yellow); border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; }
  .pos-header { display: flex; justify-content: space-between; font-weight: 700; }
  .pos-detail { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .pos-pnl { font-size: 16px; font-weight: 700; }

  /* Patterns */
  .pattern-bar { margin-bottom: 6px; }
  .pattern-name { font-size: 12px; margin-bottom: 3px; display: flex; justify-content: space-between; }
  .bar-track { background: var(--border); border-radius: 4px; height: 6px; }
  .bar-fill { height: 6px; border-radius: 4px; }
  .c0{background:var(--green)} .c1{background:var(--red)} .c2{background:var(--blue)}
  .c3{background:var(--yellow)} .c4{background:var(--purple)} .c5{background:#ec4899} .c6{background:var(--muted)}

  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { color: var(--muted); font-weight: 500; text-align: left; padding: 5px 4px; border-bottom: 1px solid var(--border); font-size: 11px; }
  td { padding: 7px 4px; border-bottom: 1px solid var(--border); }
  tr:last-child td { border-bottom: none; }
  .badge { display: inline-block; padding: 2px 6px; border-radius: 8px; font-size: 10px; font-weight: 600; }
  .badge-0{background:rgba(16,185,129,.15);color:var(--green)}
  .badge-1{background:rgba(239,68,68,.15);color:var(--red)}
  .badge-2{background:rgba(59,130,246,.15);color:var(--blue)}
  .badge-3{background:rgba(245,158,11,.15);color:var(--yellow)}
  .badge-4{background:rgba(139,92,246,.15);color:var(--purple)}
  .badge-5{background:rgba(236,72,153,.15);color:#ec4899}
  .badge-6{background:rgba(107,114,128,.15);color:var(--muted)}

  #live-status { font-size: 11px; color: var(--muted); text-align: center; padding: 8px; }
  #scan-count { font-size: 11px; color: var(--green); }
  .wallets-box { margin-top: 6px; border-top: 1px solid var(--border); padding-top: 4px; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1><div id="status-dot"></div> CACA PUMP</h1>
    <span id="scan-count">—</span>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('live')">🔴 Live</button>
    <button class="tab" onclick="switchTab('sim')">📊 Simulação</button>
    <button class="tab" onclick="switchTab('dados')">🗄 Dados</button>
  </div>
</header>

<div class="container">

  <!-- ABA LIVE -->
  <div class="page active" id="page-live">
    <div id="positions-box"></div>
    <h2>Feed ao vivo — DexScreener</h2>
    <div id="live-status">Iniciando scanner...</div>
    <div id="live-log"></div>
  </div>

  <!-- ABA SIMULACAO -->
  <div class="page" id="page-sim">
    <div class="grid-2" style="margin-top:10px">
      <div class="card">
        <div class="card-title">PnL Simulado</div>
        <div class="card-value pnl-pos" id="s-pnl">—</div>
        <div class="card-sub">entrada: 10 SOL/trade</div>
      </div>
      <div class="card">
        <div class="card-title">Trades</div>
        <div class="card-value" id="s-trades">—</div>
        <div class="card-sub" id="s-winrate">—</div>
      </div>
    </div>
    <h2>Últimos Trades</h2>
    <div id="trades-list"></div>
    <h2>Log da Simulação</h2>
    <div style="background:#000;border:1px solid var(--border);border-radius:8px;padding:10px;font-family:monospace;font-size:11px;color:#9ca3af;max-height:250px;overflow-y:auto" id="sim-log"></div>
  </div>

  <!-- ABA DADOS -->
  <div class="page" id="page-dados">
    <div class="grid-4" style="margin-top:10px">
      <div class="card"><div class="card-title">Tokens</div><div class="card-value" id="d-tokens">—</div></div>
      <div class="card"><div class="card-title">Carteiras</div><div class="card-value" id="d-wallets">—</div></div>
      <div class="card"><div class="card-title">Padrões</div><div class="card-value" id="d-pats">—</div></div>
      <div class="card"><div class="card-title">Win%</div><div class="card-value" id="d-win">—</div></div>
    </div>
    <h2>Padrões</h2>
    <div class="card" id="d-patterns-bars"></div>
    <h2>Tokens Recentes</h2>
    <div class="card" style="overflow-x:auto"><table>
      <tr><th>Token</th><th>Padrão</th><th>Baleias</th><th>Bots%</th></tr>
      <tbody id="d-token-table"></tbody>
    </table></div>
    <div style="text-align:center;color:var(--muted);font-size:11px;padding:10px" id="d-updated">—</div>
  </div>

</div>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(r => r.forEach(sw => sw.unregister()));
}

const PAT_NAMES = {0:'BALEIA_FORTE',1:'BOT_SWARM',2:'LENTO_WHALE',3:'EXPLOSIVO',4:'ORGANIC',5:'RUG_CAND',6:'MISTO'};
const SOL_PRICE = 175;
const ENTRY_SOL = 10;
const MIN_WHALE = 2;
const MIN_SOL5  = 0.5;
const MAX_AGE   = 60;
const MAX_BOT   = 0.90;
const TP = 0.35, SL = -0.12, MAX_HOLD = 12;

let liveLog = [];
let positions = {};
let simTrades = [];
let scanTotal = 0;
let staticData = null;
let activeTab = 'live';

function switchTab(t) {
  activeTab = t;
  document.querySelectorAll('.tab').forEach((b,i) => b.classList.toggle('active', ['live','sim','dados'][i]===t));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+t).classList.add('active');
  if (t==='sim'||t==='dados') renderStatic();
}

// ── LIVE SCANNER ────────────────────────────────────────────
function classify(p) {
  const vol5 = parseFloat(p.volume?.m5 || 0);
  const buys5 = parseInt(p.txns?.m5?.buys || 0);
  const avgBuy = vol5 / Math.max(1, buys5);
  const whaleC = Math.max(0, Math.floor(vol5 / (0.3 * SOL_PRICE * 1.5)));
  const botC   = Math.max(0, Math.floor(buys5 * Math.max(0, 1 - avgBuy / 40)));
  const sol5   = vol5 / SOL_PRICE;
  const botR   = buys5 > 0 ? botC / buys5 : 0;
  const ageMin = (Date.now()/1000 - (p.pairCreatedAt||0)/1000) / 60;
  return { whaleC, botC, sol5, botR, ageMin };
}

function isSignal(m) {
  return m.whaleC >= MIN_WHALE && m.sol5 >= MIN_SOL5 && m.ageMin <= MAX_AGE && m.botR <= MAX_BOT;
}

function now() {
  return new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

function addLog(item) {
  liveLog.unshift(item);
  if (liveLog.length > 60) liveLog.pop();
  if (activeTab === 'live') renderLive();
}

function renderLive() {
  const box = document.getElementById('live-log');
  if (!box) return;
  box.innerHTML = liveLog.map(l => `
    <div class="live-item ${l.cls}">
      <div class="live-header">
        <span class="live-symbol">${l.sym}</span>
        <span class="live-badge badge-${l.cls}">${l.label}</span>
      </div>
      <div class="live-detail">${l.detail}</div>
      ${l.wallets ? `<div class="wallets-box">${l.wallets}</div>` : ''}
      <div class="live-time">${l.time}</div>
    </div>`).join('');

  // Posicoes abertas
  const posArr = Object.values(positions);
  const pb = document.getElementById('positions-box');
  if (!posArr.length) { pb.innerHTML=''; return; }
  pb.innerHTML = '<h2>Posições abertas</h2>' + posArr.map(p => {
    const cur = p.curPrice || p.entry;
    const pct = ((cur - p.entry) / p.entry * 100).toFixed(1);
    const sol = (ENTRY_SOL * pct/100).toFixed(3);
    const cls = pct >= 0 ? 'pnl-pos' : 'pnl-neg';
    return `<div class="position">
      <div class="pos-header"><span>${p.sym}</span><span class="pos-pnl ${cls}">${pct>=0?'+':''}${sol} SOL</span></div>
      <div class="pos-detail">entrada $${p.entry.toFixed(8)} · TP +35% · SL -12% · ${p.age||0}min</div>
    </div>`;
  }).join('');
}

async function fetchWallets(mint) {
  try {
    const RPC = 'https://api.mainnet-beta.solana.com';
    // Pega ultimas 8 assinaturas do mint
    const r1 = await fetch(RPC, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({jsonrpc:'2.0',id:1,method:'getSignaturesForAddress',
        params:[mint,{limit:8,commitment:'confirmed'}]})
    });
    const d1 = await r1.json();
    const sigs = (d1.result||[]).map(s=>s.signature).filter(Boolean);
    if (!sigs.length) return '';

    // Busca detalhes das txs em paralelo (max 5)
    const txResults = await Promise.all(sigs.slice(0,5).map(sig =>
      fetch(RPC, {method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({jsonrpc:'2.0',id:1,method:'getTransaction',
          params:[sig,{encoding:'json',maxSupportedTransactionVersion:0,commitment:'confirmed'}]})
      }).then(r=>r.json()).catch(()=>null)
    ));

    const walletMap = {};
    for (const res of txResults) {
      if (!res?.result) continue;
      const tx = res.result;
      const accs = tx.transaction?.message?.accountKeys || [];
      const pre  = tx.meta?.preBalances  || [];
      const post = tx.meta?.postBalances || [];
      accs.forEach((acc, i) => {
        const addr = typeof acc === 'string' ? acc : acc.pubkey;
        if (!addr || addr.length < 32) return;
        const diff = (post[i]||0) - (pre[i]||0);
        const solAmt = Math.abs(diff) / 1e9;
        if (solAmt < 0.001) return;
        if (!walletMap[addr] || walletMap[addr].sol < solAmt)
          walletMap[addr] = {sol: solAmt, diff};
      });
    }

    const sorted = Object.entries(walletMap)
      .filter(([,v]) => v.sol >= 0.001)
      .sort((a,b) => b[1].sol - a[1].sol)
      .slice(0, 6);

    if (!sorted.length) return '';

    const rows = sorted.map(([addr, v]) => {
      const short = addr.slice(0,5)+'...'+addr.slice(-4);
      const sol = v.sol.toFixed(3);
      let role, color;
      if (v.sol >= 0.3)      { role='🐋 BALEIA'; color='var(--green)'; }
      else if (v.sol <= 0.005){ role='🤖 BOT';    color='var(--red)'; }
      else                    { role='👤 RETAIL';  color='var(--muted)'; }
      const arrow = v.diff > 0 ? '▲' : '▼';
      return `<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--border);font-size:11px">
        <span style="font-family:monospace;color:var(--blue)">${short}</span>
        <span style="color:${color}">${role}</span>
        <span style="color:var(--text)">${arrow} ${sol} SOL</span>
      </div>`;
    }).join('');

    return `<div style="margin-top:6px;border-top:1px solid var(--border);padding-top:4px">${rows}</div>`;
  } catch(e) { return ''; }
}

async function scanOnce() {
  try {
    const r = await fetch('https://api.dexscreener.com/token-profiles/latest/v1', {cache:'no-store'});
    if (!r.ok) return;
    const items = await r.json();
    const mints = [...new Set((Array.isArray(items)?items:[]).filter(i=>i.chainId==='solana').map(i=>i.tokenAddress).slice(0,20))];
    if (!mints.length) return;

    const r2 = await fetch(`https://api.dexscreener.com/latest/dex/tokens/${mints.join(',')}`, {cache:'no-store'});
    if (!r2.ok) return;
    const data = await r2.json();
    const pairs = (data.pairs||[]).filter(p=>p.chainId==='solana'&&p.priceUsd);
    scanTotal += pairs.length;
    document.getElementById('scan-count').textContent = `${scanTotal} avaliados`;
    document.getElementById('live-status').style.display = 'none';

    for (const p of pairs) {
      const sym = p.baseToken?.symbol || '?';
      const mint = p.baseToken?.address || '';
      const price = parseFloat(p.priceUsd || 0);
      const m = classify(p);
      const liq = parseFloat(p.liquidity?.usd || 0);

      // Atualiza posicoes abertas
      if (positions[mint]) {
        const pos = positions[mint];
        pos.curPrice = price;
        pos.age = Math.floor((Date.now() - pos.openedAt) / 60000);
        const pct = (price - pos.entry) / pos.entry;
        if (pct >= TP) {
          const pnl = ENTRY_SOL * pct;
          simTrades.push({sym, pnl, pct: pct*100, reason:'TP', time: now()});
          addLog({cls:'win', sym, label:'✓ TP', detail:`+${(pct*100).toFixed(1)}% = +${pnl.toFixed(3)} SOL`, time: now()});
          delete positions[mint];
        } else if (pct <= SL || pos.age >= MAX_HOLD) {
          const pnl = ENTRY_SOL * pct;
          simTrades.push({sym, pnl, pct: pct*100, reason: pos.age>=MAX_HOLD?'TIME':'SL', time: now()});
          addLog({cls:'loss', sym, label:'✗ SL', detail:`${(pct*100).toFixed(1)}% = ${pnl.toFixed(3)} SOL`, time: now()});
          delete positions[mint];
        }
        continue;
      }

      if (isSignal(m) && !positions[mint]) {
        const t = now();
        // Mostra sinal imediatamente, depois adiciona carteiras async
        const sigItem = {cls:'signal', sym, label:'SINAL',
          detail:`baleias=${m.whaleC} sol5m=${m.sol5.toFixed(1)} bot=${(m.botR*100).toFixed(0)}% liq=$${Math.round(liq/1000)}k`,
          time: t, wallets: '<span style="color:var(--muted);font-size:10px">buscando carteiras...</span>'};
        addLog(sigItem);
        positions[mint] = {sym, entry: price, curPrice: price, openedAt: Date.now(), age: 0};
        addLog({cls:'entry', sym, label:'ENTRADA', detail:`@ $${price.toFixed(8)} · 10 SOL`, time: t});

        // Busca carteiras em background e atualiza
        fetchWallets(mint).then(walletHtml => {
          sigItem.wallets = walletHtml || '<span style="color:var(--muted);font-size:10px">sem carteiras detectadas</span>';
          if (activeTab==='live') renderLive();
        });
      }
    }
    updateSimTab();
  } catch(e) {
    document.getElementById('live-status').textContent = 'Erro: ' + e.message;
  }
}

function updateSimTab() {
  const pnl = simTrades.reduce((s,t) => s + t.pnl, 0);
  const wins = simTrades.filter(t => t.pnl > 0).length;
  const wr = simTrades.length ? Math.round(wins/simTrades.length*100) : 0;
  document.getElementById('s-pnl').textContent = (pnl>=0?'+':'') + pnl.toFixed(3) + ' SOL';
  document.getElementById('s-pnl').className = 'card-value ' + (pnl>=0?'pnl-pos':'pnl-neg');
  document.getElementById('s-trades').textContent = simTrades.length;
  document.getElementById('s-winrate').textContent = `${wr}% win · ${wins}W ${simTrades.length-wins}L`;

  const tlist = document.getElementById('trades-list');
  tlist.innerHTML = [...simTrades].reverse().slice(0,10).map(t => `
    <div class="live-item ${t.pnl>0?'win':'loss'}" style="margin-bottom:6px">
      <div class="live-header">
        <span class="live-symbol">${t.sym}</span>
        <span class="${t.pnl>0?'pnl-pos':'pnl-neg'}">${t.pnl>=0?'+':''}${t.pnl.toFixed(3)} SOL</span>
      </div>
      <div class="live-detail">${t.reason} · ${t.pct.toFixed(1)}% · ${t.time}</div>
    </div>`).join('');
}

// ── DADOS ESTÁTICOS (GitHub API) ────────────────────────────
async function loadStatic() {
  try {
    const r = await fetch('https://api.github.com/repos/Freire007-byte/incnetwork/contents/dashboard_data.json', {
      cache: 'no-store', headers: {'Accept': 'application/vnd.github.v3.raw'}
    });
    if (!r.ok) return;
    staticData = await r.json();

    // Merge trades do servidor no sim local se ainda vazio
    if (simTrades.length === 0 && staticData.sim?.last_trades?.length) {
      staticData.sim.last_trades.forEach(t => {
        simTrades.push({sym: t.symbol||'?', pnl: t.pnl_sol||0, pct: t.pnl_pct||0, reason: t.exit_reason||'', time:'servidor'});
      });
      updateSimTab();
    }

    // Log do servidor no sim
    const logEl = document.getElementById('sim-log');
    if (logEl && staticData.sim?.log_tail) {
      logEl.innerHTML = staticData.sim.log_tail.map(l => {
        const c = l.includes('[SIM') ? 'color:var(--green)' : l.includes('[SKIP]') ? 'color:var(--yellow)' : '';
        return `<div style="${c}">${l.replace(/</g,'&lt;')}</div>`;
      }).join('');
      logEl.scrollTop = logEl.scrollHeight;
    }

    if (activeTab==='sim'||activeTab==='dados') renderStatic();
  } catch(e) {}
}

function renderStatic() {
  if (!staticData) return;
  const d = staticData, sim = d.sim||{};
  const pats = d.patterns||{};
  const patTotal = Object.values(pats).reduce((a,b)=>a+b,0)||1;

  // Dados tab
  document.getElementById('d-tokens').textContent = d.total_tokens||0;
  document.getElementById('d-wallets').textContent = d.total_wallets||0;
  document.getElementById('d-pats').textContent = patTotal;
  const wr = sim.trades>0 ? Math.round(sim.wins/sim.trades*100) : 0;
  document.getElementById('d-win').textContent = wr+'%';
  document.getElementById('d-updated').textContent = 'Atualizado: ' + (d.updated_at||'—');

  const bars = document.getElementById('d-patterns-bars');
  bars.innerHTML = Object.entries(pats).map(([name,cnt],i) => {
    const pct = Math.round(cnt/patTotal*100);
    return `<div class="pattern-bar">
      <div class="pattern-name"><span>${name}</span><span>${cnt} (${pct}%)</span></div>
      <div class="bar-track"><div class="bar-fill c${i}" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');

  const tbody = document.getElementById('d-token-table');
  tbody.innerHTML = (d.tokens||[]).slice(0,20).map(t => {
    const pid = t.pattern_id??-1;
    return `<tr>
      <td><b>${t.symbol||'?'}</b><br><span style="color:var(--muted);font-size:10px">${(t.name||'').substring(0,12)}</span></td>
      <td><span class="badge badge-${pid}">${PAT_NAMES[pid]||'N/A'}</span></td>
      <td>${t.whale_count||0}</td>
      <td>${t.bot_ratio?(t.bot_ratio*100).toFixed(0)+'%':'-'}</td>
    </tr>`;
  }).join('');
}

// ── INIT ────────────────────────────────────────────────────
