name: Caca Pump -- Agentes 7 Dias

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  run-agents:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restaurar banco de dados
        uses: actions/download-artifact@v4
        with:
          name: caca-pump-db
          path: data/
        continue-on-error: true

      - name: Restaurar trades da simulacao
        uses: actions/download-artifact@v4
        with:
          name: caca-pump-sim
          path: /tmp/inc_study/
        continue-on-error: true

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests --quiet

      - name: Criar diretorios e restaurar seed
        run: |
          mkdir -p data logs
          mkdir -p /tmp/inc_study
          # Se nao tem DB do artifact mas tem no git (seed inicial), usa o do git
          if [ ! -f data/caca_pump.db ] && [ -f data/.gitkeep ]; then
            echo "Usando DB vazio (primeiro ciclo)"
          fi
          # Copia trades seed do git se artifact nao restaurou
          if [ ! -f /tmp/inc_study/sim_trades.jsonl ] && [ -f inc_study/sim_trades.jsonl ]; then
            cp inc_study/sim_trades.jsonl /tmp/inc_study/sim_trades.jsonl
            cp inc_study/sim_results.txt /tmp/inc_study/sim_results.txt 2>/dev/null || true
            echo "Trades seed restaurados do git: $(wc -l < /tmp/inc_study/sim_trades.jsonl) trades"
          fi

      - name: Inicializar banco
        run: |
          DB_PATH=data/caca_pump.db python -c "
          import sys; sys.path.insert(0,'agents')
          import os; os.environ['DB_PATH']='data/caca_pump.db'
          import sqlite3
          DB='data/caca_pump.db'
          conn=sqlite3.connect(DB)
          conn.execute('PRAGMA journal_mode=WAL')
          for sql in [
            'CREATE TABLE IF NOT EXISTS tokens (mint TEXT PRIMARY KEY, symbol TEXT, name TEXT, created_at INTEGER, market_cap REAL, vol_24h REAL, liq_usd REAL, peak_h1 REAL, peak_h6 REAL, collected_at INTEGER, source TEXT DEFAULT dexscreener)',
            'CREATE TABLE IF NOT EXISTS token_txs (id INTEGER PRIMARY KEY AUTOINCREMENT, mint TEXT, wallet TEXT, sol_amount REAL, tx_type TEXT, role TEXT, ts INTEGER)',
            'CREATE TABLE IF NOT EXISTS wallet_appearances (id INTEGER PRIMARY KEY AUTOINCREMENT, wallet TEXT, mint TEXT, role TEXT, sol_amount REAL, ts INTEGER)',
            'CREATE TABLE IF NOT EXISTS token_patterns (mint TEXT PRIMARY KEY, pattern_id INTEGER DEFAULT -1, whale_count INTEGER DEFAULT 0, bot_count INTEGER DEFAULT 0, retail_count INTEGER DEFAULT 0, sol_5min REAL DEFAULT 0, bot_ratio REAL DEFAULT 0, duration_min REAL DEFAULT 0, analyzed_at INTEGER DEFAULT 0)',
            'CREATE TABLE IF NOT EXISTS wallet_groups (id INTEGER PRIMARY KEY AUTOINCREMENT, wallet TEXT, group_id INTEGER, role TEXT, token_count INTEGER, total_sol REAL)'
          ]: conn.execute(sql)
          conn.commit(); conn.close()
          print('DB OK')
          "

      - name: Patch caminhos dos agentes
        run: |
          python3 -c "
          import os, re
          base = os.getcwd()
          files = ['agents/collector.py','agents/analyzer.py','agents/network.py',
                   'agents/patterns.py','agents/pumpfun.py','inc-radar/pump_hunter_sim.py']
          for f in files:
              if not os.path.exists(f): continue
              c = open(f).read()
              c = c.replace('/root/caca-pump/agents', base+'/agents')
              c = c.replace('/root/caca-pump/data',   base+'/data')
              c = c.replace('/root/caca-pump/logs',   base+'/logs')
              c = c.replace('/tmp/inc_study',         '/tmp/inc_study')
              open(f,'w').write(c)
              print(f'Patched {f}')
          "

      - name: Iniciar agentes e atualizar dashboard a cada 30min
        run: |
          export DB_PATH=data/caca_pump.db

          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          python3 agents/collector.py >> logs/collector.log 2>&1 &
          echo "collector PID=$!"

          python3 agents/analyzer.py >> logs/analyzer.log 2>&1 &
          echo "analyzer PID=$!"

          python3 agents/pumpfun.py >> logs/pumpfun.log 2>&1 &
          echo "pumpfun PID=$!"

          python3 agents/network.py >> logs/network.log 2>&1 &
          echo "network PID=$!"

          python3 agents/patterns.py >> logs/patterns.log 2>&1 &
          echo "patterns PID=$!"

          python3 inc-radar/pump_hunter_sim.py >> logs/sim.log 2>&1 &
          echo "sim PID=$!"

          echo "Agentes iniciados. Atualizando dashboard a cada 30min por 5h20m..."

          END_TIME=$(( $(date +%s) + 19200 ))
          CYCLE=0
          while [ $(date +%s) -lt $END_TIME ]; do
            sleep 1800
            CYCLE=$(( CYCLE + 1 ))
            echo "=== Update #$CYCLE -- $(date -u '+%H:%M') UTC ==="
            DB_PATH=data/caca_pump.db python3 agents/export_dashboard.py || true
            git pull --rebase origin main --quiet 2>/dev/null || true
            git add dashboard_data.json || true
            git diff --cached --quiet || git commit -m "live: dashboard $(date -u '+%H:%M') UTC"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Freire007-byte/incnetwork.git HEAD:main || true
          done

          echo "Finalizando agentes..."
          kill $(jobs -p) 2>/dev/null || true
          sleep 5

      - name: Exportar dados do dashboard
        run: |
          DB_PATH=data/caca_pump.db python3 agents/export_dashboard.py
        if: always()

      - name: Publicar dashboard no GitHub Pages
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add dashboard_data.json || true
          git diff --cached --quiet || git commit -m "auto: dashboard $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Freire007-byte/incnetwork.git HEAD:main || true
        if: always()

      - name: Salvar banco como artifact
        uses: actions/upload-artifact@v4
        with:
          name: caca-pump-db
          path: data/caca_pump.db
          retention-days: 8
          overwrite: true
        if: always()

      - name: Salvar trades simulacao como artifact
        uses: actions/upload-artifact@v4
        with:
          name: caca-pump-sim
          path: /tmp/inc_study/
          retention-days: 8
          overwrite: true
        if: always()

      - name: Status final
        run: |
          echo "=== RESUMO ==="
          python3 -c "
          import sqlite3, json
          conn = sqlite3.connect('data/caca_pump.db')
          print(f'Tokens: {conn.execute(\"SELECT COUNT(*) FROM tokens\").fetchone()[0]}')
          print(f'Carteiras: {conn.execute(\"SELECT COUNT(DISTINCT wallet) FROM wallet_appearances\").fetchone()[0]}')
          print(f'Padroes: {conn.execute(\"SELECT COUNT(*) FROM token_patterns WHERE pattern_id>=0\").fetchone()[0]}')
          conn.close()
          " 2>/dev/null || true
          tail -5 /tmp/inc_study/sim_results.txt 2>/dev/null || true
        if: always()
