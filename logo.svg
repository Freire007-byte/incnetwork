<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0b14"/>
      <stop offset="100%" style="stop-color:#0e0f1e"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c6dff"/>
      <stop offset="50%" style="stop-color:#00e5ff"/>
      <stop offset="100%" style="stop-color:#7c6dff"/>
    </linearGradient>
    <linearGradient id="text" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#00e5ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="128" cy="128" r="128" fill="url(#bg)"/>

  <!-- Outer glow ring -->
  <circle cx="128" cy="128" r="118" fill="none" stroke="url(#ring)" stroke-width="2" opacity="0.4"/>

  <!-- Inner ring -->
  <circle cx="128" cy="128" r="108" fill="none" stroke="url(#ring)" stroke-width="1" opacity="0.2"/>

  <!-- Signal arcs (Proof-of-Signal concept) -->
  <path d="M 68 128 A 60 60 0 0 1 188 128" fill="none" stroke="#7c6dff" stroke-width="2.5" opacity="0.5" stroke-linecap="round"/>
  <path d="M 82 128 A 46 46 0 0 1 174 128" fill="none" stroke="#00e5ff" stroke-width="2" opacity="0.4" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="128" cy="128" r="6" fill="#00e5ff" filter="url(#glow2)" opacity="0.9"/>

  <!-- INC text -->
  <text x="128" y="140"
    font-family="'Arial Black', 'Arial', sans-serif"
    font-weight="900"
    font-size="52"
    letter-spacing="2"
    text-anchor="middle"
    fill="url(#text)"
    filter="url(#glow)">INC</text>

  <!-- Bottom tagline -->
  <text x="128" y="172"
    font-family="'Arial', sans-serif"
    font-weight="600"
    font-size="11"
    letter-spacing="4"
    text-anchor="middle"
    fill="#7c6dff"
    opacity="0.8">NETWORK</text>

  <!-- Corner signal dots -->
  <circle cx="128" cy="52" r="3" fill="#7c6dff" opacity="0.6" filter="url(#glow)"/>
  <circle cx="178" cy="70" r="2" fill="#00e5ff" opacity="0.5"/>
  <circle cx="78" cy="70" r="2" fill="#00e5ff" opacity="0.5"/>
</svg>
