headersOrigin = "config"
plugins = []

[functions]

  [functions."*"]

[build]
publish = "C:\\Users\\Loja\\Downloads\\INC-SmartContract\\INC-contract\\frontend"
publishOrigin = "config"

  [build.environment]

  [build.processing]

    [build.processing.css]

    [build.processing.html]

    [build.processing.images]

    [build.processing.js]

  [build.services]

[[headers]]
for = "/*"

  [headers.values]
  X-Frame-Options = "DENY"
  X-Content-Type-Options = "nosniff"
  Referrer-Policy = "strict-origin-when-cross-origin"
  Cache-Control = "public, max-age=3600"

[[headers]]
for = "/index.html"

  [headers.values]
  Cache-Control = "no-cache"

[[headers]]
for = "/ethers-5.7.umd.min.js"

  [headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/qrcode.min.js"

  [headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/sw.js"

  [headers.values]
  Cache-Control = "no-cache"
  Service-Worker-Allowed = "/"

[[headers]]
for = "/manifest.json"

  [headers.values]
  Cache-Control = "no-cache"
  Content-Type = "application/manifest+json"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
force = false

  [redirects.query]

  [redirects.conditions]

  [redirects.headers]