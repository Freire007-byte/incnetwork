<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c6dff"/>
      <stop offset="55%" stop-color="#4da8ff"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c6dff"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
    <radialGradient id="bg" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#141830"/>
      <stop offset="100%" stop-color="#06070f"/>
    </radialGradient>
    <radialGradient id="glow-c" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c6dff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7c6dff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="circle-clip">
      <circle cx="200" cy="200" r="185"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="193" fill="url(#bg)"/>

  <!-- Ambient glow center -->
  <circle cx="200" cy="185" r="140" fill="url(#glow-c)"/>

  <!-- Grid lines (brand aesthetic) -->
  <g clip-path="url(#circle-clip)" opacity="0.06" stroke="#7c6dff" stroke-width="1">
    <line x1="15" y1="120" x2="385" y2="120"/>
    <line x1="15" y1="160" x2="385" y2="160"/>
    <line x1="15" y1="200" x2="385" y2="200"/>
    <line x1="15" y1="240" x2="385" y2="240"/>
    <line x1="15" y1="280" x2="385" y2="280"/>
    <line x1="120" y1="15" x2="120" y2="385"/>
    <line x1="160" y1="15" x2="160" y2="385"/>
    <line x1="200" y1="15" x2="200" y2="385"/>
    <line x1="240" y1="15" x2="240" y2="385"/>
    <line x1="280" y1="15" x2="280" y2="385"/>
  </g>

  <!-- Outer ring border -->
  <circle cx="200" cy="200" r="193" fill="none" stroke="url(#g)" stroke-width="3.5"/>
  <!-- Inner thin ring -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="url(#g)" stroke-width="0.8" opacity="0.3"/>

  <!-- ── WALLET BODY ── -->
  <!-- Shadow/depth -->
  <rect x="87" y="152" width="226" height="152" rx="20" fill="#000" opacity="0.4"/>
  <!-- Main wallet card -->
  <rect x="84" y="148" width="226" height="152" rx="20" fill="#0c0e1f" stroke="url(#g)" stroke-width="2.5"/>
  <!-- Top stripe (card header) -->
  <rect x="84" y="148" width="226" height="38" rx="20" fill="#111428"/>
  <rect x="84" y="166" width="226" height="20" fill="#111428"/>

  <!-- Card chip / right pocket -->
  <rect x="216" y="176" width="72" height="48" rx="10" fill="#0e1025" stroke="url(#g)" stroke-width="1.5"/>
  <!-- Chip lines -->
  <line x1="226" y1="188" x2="278" y2="188" stroke="url(#g2)" stroke-width="1" opacity="0.5"/>
  <line x1="226" y1="197" x2="278" y2="197" stroke="url(#g2)" stroke-width="1" opacity="0.5"/>
  <line x1="226" y1="206" x2="260" y2="206" stroke="url(#g2)" stroke-width="1" opacity="0.3"/>
  <circle cx="238" cy="200" r="5" fill="none" stroke="url(#g)" stroke-width="1.2" opacity="0.7"/>

  <!-- ── INC DIAMOND SYMBOL (◈ drawn manually) ── -->
  <!-- Outer diamond -->
  <polygon points="152,155 185,188 152,221 119,188"
           fill="none" stroke="url(#g)" stroke-width="2.8"
           filter="url(#blur-glow)"/>
  <!-- Inner diamond (filled, semi-transparent) -->
  <polygon points="152,165 175,188 152,211 129,188"
           fill="url(#g)" opacity="0.12"/>
  <!-- Inner diamond outline -->
  <polygon points="152,167 173,188 152,209 131,188"
           fill="none" stroke="url(#g)" stroke-width="1.5" opacity="0.6"/>
  <!-- Center dot -->
  <circle cx="152" cy="188" r="7" fill="url(#g)" filter="url(#blur-glow)"/>
  <circle cx="152" cy="188" r="3.5" fill="#fff" opacity="0.9"/>

  <!-- Dotted balance line (wallet balance indicator) -->
  <rect x="100" y="242" width="108" height="8" rx="4" fill="url(#g)" opacity="0.15"/>
  <rect x="100" y="242" width="68" height="8" rx="4" fill="url(#g)" opacity="0.5" filter="url(#soft-glow)"/>
  <!-- Small label dots -->
  <circle cx="100" cy="264" r="3" fill="url(#g)" opacity="0.3"/>
  <circle cx="110" cy="264" r="3" fill="url(#g)" opacity="0.3"/>
  <circle cx="120" cy="264" r="3" fill="url(#g)" opacity="0.3"/>

  <!-- ── TEXT: INC ── -->
  <text x="200" y="345"
        text-anchor="middle"
        font-family="'JetBrains Mono', 'Courier New', monospace"
        font-size="15" font-weight="700" letter-spacing="10"
        fill="url(#g)" opacity="0.6">INC</text>
  <text x="200" y="365"
        text-anchor="middle"
        font-family="'JetBrains Mono', 'Courier New', monospace"
        font-size="26" font-weight="800" letter-spacing="8"
        fill="url(#g)" filter="url(#soft-glow)">WALLET</text>

  <!-- Bottom accent dots -->
  <circle cx="178" cy="378" r="2" fill="url(#g)" opacity="0.4"/>
  <circle cx="200" cy="382" r="2.5" fill="url(#g)" opacity="0.7"/>
  <circle cx="222" cy="378" r="2" fill="url(#g)" opacity="0.4"/>
</svg>
